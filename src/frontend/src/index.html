<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Figtree:wght@300;400;500;600;700&display=swap">

    <title>Shop — Serverless eCommerce</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.0.6/css/pico.min.css"
    />
    <link rel="stylesheet" href="/style.css" />
    <script
      defer
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script
      defer
      src="https://www.datadoghq-browser-agent.com/eu1/v5/datadog-rum.js"
      type="text/javascript"
    ></script>
    <script type="module" src="/config.js"></script>
    <script type="module" src="/app.js"></script>
    <script type="module" src="page.js"></script>
  </head>
  <body>
    <div id="header"></div>
    <main class="container">
      <div class="shop-intro">
        <h2>Browse Products</h2>
        <p class="shop-tagline">Select items and add them to your order.</p>
      </div>

      <div class="search-section">
        <form id="searchForm" onsubmit="return false;">
          <div class="search-bar">
            <input
              type="search"
              id="searchInput"
              placeholder='Ask AI — e.g. "gifts for outdoor enthusiasts"'
              aria-label="Search products with AI"
            />
            <button type="submit" id="searchBtn" onclick="runSearch()">Search</button>
          </div>
        </form>
        <div id="searchResults" style="display:none;">
          <article class="search-answer" id="searchAnswer"></article>
          <div class="search-product-cards" id="searchProductCards"></div>
          <button class="outline" onclick="clearSearch()">Clear search — show all products</button>
        </div>
      </div>

      <div class="grid">
        <div class="product-grid" id="productCards">
          <!-- Product cards will be dynamically inserted here -->
        </div>

        <div class="order-summary">
          <article>
            <header>
              <h3>Your Order</h3>
            </header>
            <div id="orderItems">
              <p id="emptyOrderMessage">Your order is empty</p>
              <ul id="orderList"></ul>
            </div>
            <footer>
              <p>Total Items: <span id="totalItems">0</span></p>
              <button id="checkoutBtn" onclick="createOrder()" disabled>
                Proceed to Checkout
              </button>
            </footer>
          </article>
        </div>
      </div>

      <div id="loading"></div>
    </main>
    <div id="footer"></div>
    <dialog id="productModal">
      <article>
        <header>
          <button aria-label="Close" rel="prev" onclick="closeProductModal()"></button>
        </header>
        <div class="dialog-body">
          <h3>Pricing</h3>
          <table id="productPricingTable">
            <thead>
              <tr>
                <th scope="col">Quantity</th>
                <th scope="col">Price</th>
              </tr>
            </thead>
            <tbody id="pricingTableBody"></tbody>
          </table>
          <h3>Activity</h3>
          <ul id="productActivityList"></ul>
        </div>
      </article>
    </dialog>
  </body>
</html>
