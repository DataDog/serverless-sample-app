<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Figtree:wght@300;400;500;600;700&display=swap">

    <title>Admin: Products — Serverless eCommerce</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.0.6/css/pico.min.css"
    />
    <link rel="stylesheet" href="/style.css" />
    <script
      defer
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script
      defer
      src="https://www.datadoghq-browser-agent.com/eu1/v5/datadog-rum.js"
      type="text/javascript"
    ></script>
    <script type="module" src="/config.js"></script>
    <script type="module" src="/app.js"></script>
    <script type="module" src="/admin/admin.js"></script>
    <script type="module" src="page.js"></script>
  </head>
  <body>
    <div id="header"></div>
    <main class="container">
      <fieldset role="group">
        <label for="productName">Product Name</label>
        <input
          id="productName"
          type="text"
          name="productName"
          placeholder="Product Name"
          aria-label="Product Name"
          required
        />
        <label for="productPrice">Price</label>
        <input
          id="productPrice"
          type="number"
          name="productPrice"
          placeholder="Price"
          aria-label="Price"
          required
        />
        <button id="createProductBtn" onclick="createProduct()">Create</button>
      </fieldset>
      <div id="products">
        <table>
          <thead>
            <tr>
              <th scope="col">Name</th>
              <th scope="col">Price</th>
              <th scope="col"></th>
              <th scope="col"></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div id="loading"></div>
    </main>
    <div id="footer"></div>
    <dialog id="productModal">
      <article>
        <header>
          <button aria-label="Close" rel="prev" onclick="closeProductEditModal()"></button>
        </header>
        <div class="dialog-body">
          <label for="updateProductName">Product Name</label>
          <input
            id="updateProductName"
            type="text"
            name="productName"
            placeholder="Product Name"
            aria-label="Product Name"
            required
          />
          <label for="updateProductPrice">Price</label>
          <input
            id="updateProductPrice"
            type="number"
            name="productPrice"
            placeholder="Price"
            aria-label="Price"
            required
          />
          <button id="updateProductBtn" onclick="updateProduct()">Update</button>

          <label for="updateStockLevel" style="margin-top: 1rem;">Stock Level</label>
          <input
            id="updateStockLevel"
            type="number"
            name="stockLevel"
            placeholder="Stock Level"
            aria-label="Stock Level"
            required
          />
          <button id="updateStockLevelBtn" onclick="updateStock()">Update Stock</button>

          <h3>Pricing</h3>
          <table id="productPricingTable">
            <thead>
              <tr>
                <th scope="col">Quantity</th>
                <th scope="col">Price</th>
              </tr>
            </thead>
            <tbody id="pricingTableBody"></tbody>
          </table>
          <h3>Activity</h3>
          <ul id="productActivityList"></ul>
        </div>
      </article>
    </dialog>
  </body>
</html>
