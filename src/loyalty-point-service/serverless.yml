# WARNING: This serverless.yml is NOT a supported deployment path for the loyalty-point-service.
# Use template.yaml (SAM) for deployments instead.
# If you want to use the Serverless Framework, verify all handler paths and resources below
# reference valid loyalty-api handlers in src/loyalty-api/adapters/.
service: serverless-loyalty-api
frameworkVersion: "3"

plugins:
  - serverless-plugin-datadog
  - serverless-esbuild

custom:
  serviceName: NodeLoyaltyApi
  datadog:
    apiKeySecretArn: ${param:DD_API_KEY_SECRET_ARN}
    site: ${param:DD_SITE}
    env: ${sls:stage}
    service: ${self:custom.serviceName}
    version: latest
    # Use this property with care in production to ensure PII/Sensitive data is not stored in Datadog
    captureLambdaPayload: true
    propagateUpstreamTrace: true
  esbuild:
    platform: "node"
    target: "node22"
    bundle: true
    minify: true
    exclude:
      - "opentracing"
      - "dd-trace"
      - "@datadog/native-metrics"
      - "@datadog/pprof"
      - '@datadog/native-appsec'
      - '@datadog/native-iast-taint-tracking'
      - '@datadog/native-iast-rewriter'
      - 'graphql/language/visitor'
      - 'graphql/language/printer'
      - 'graphql/utilities'
      - '@aws-sdk/*'


provider:
  name: aws
  runtime: nodejs22.x
  memorySize: 512
  environment:
    TABLE_NAME: ${self:service}-${sls:stage}
    DD_EXTENSION_VERSION: "next"
    ENV: ${sls:stage}
    POWERTOOLS_SERVICE_NAME: ${self:custom.serviceName}
    POWERTOOLS_LOG_LEVEL: 'INFO'
    DOMAIN: "loyalty"
    DD_LOGS_INJECTION: "true"
    DD_DATA_STREAMS_ENABLED: "true"
  httpApi:
    cors: true
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource: "arn:aws:dynamodb:${aws:region}:*:table/${self:provider.environment.TABLE_NAME}"
        - Effect: Allow
          Action:
            - secretsmanager:GetSecretValue
          Resource: ${param:DD_API_KEY_SECRET_ARN}
        - Effect: Allow
          Action:
            - events:PutEvents
          Resource: "*"

functions:
  getLoyaltyPoints:
    handler: src/loyalty-api/adapters/getLoyaltyAccountFunction.handler
    events:
      - httpApi:
          path: /loyalty
          method: get
  spendLoyaltyPoints:
    handler: src/loyalty-api/adapters/spendLoyaltyPointsFunction.handler
    events:
      - httpApi:
          path: /loyalty
          method: post

resources:
  Resources:
    LoyaltyAccountTable:
      Type: "AWS::DynamoDB::Table"
      DeletionPolicy: Delete
      Properties:
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
        TableName: ${self:provider.environment.TABLE_NAME}
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
