AWSTemplateFormatVersion : '2010-09-09'
Transform: 
  - AWS::Serverless-2016-10-31
  - Name: DatadogServerless
    Parameters:
      stackName: !Ref "AWS::StackName"
      apiKey: !Ref DDApiKey
      nodeLayerVersion: 130
      extensionLayerVersion: '90'
      service: !Ref ServiceName
      env: !Ref Env
      version: !Ref CommitHash
      site: !Ref DDSite
      captureLambdaPayload: true
Description: A sample SAM template for deploying Lambda functions.

Conditions:
  IsNonProdEnvironment: !Not [!Equals [!Ref Env, prod]]
  IsIntegratedEnvironment: !Or
    - !Equals [ "dev", !Ref Env ]
    - !Equals [ "prod", !Ref Env ]
  IsNotIntegratedEnvironment: !And
    - !Not [!Equals [!Ref Env, prod]]
    - !Not [!Equals [!Ref Env, dev]]

Parameters: 
  ServiceName: 
    Type: String
    Default: LoyaltyService
  Env: 
    Type: String
    Default: dev
  CommitHash:
    Type: String
    Default: latest
  DDApiKey:
    Type: String
  DDSite:
    Type: String

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 29
    MemorySize: 512
    Environment:
      Variables:
        ENV: !Ref Env
        TABLE_NAME: !Ref LoyaltyAccountTable
        POWERTOOLS_SERVICE_NAME: !Ref ServiceName
        POWERTOOLS_LOG_LEVEL: 'INFO'
        DD_LOGS_INJECTION: "true"
        DD_DATA_STREAMS_ENABLED: "true"
        DOMAIN: "loyalty"
    Architectures:
      - x86_64
  Api:
    Cors:
      AllowMethods: "'POST, GET, PUT, DELETE'"
      AllowHeaders: "'*'"
      AllowOrigin: "'*'"

Resources:
  DDApiKeySecret:
    Type: 'AWS::SecretsManager::Secret'
    Properties:
      Name: !Sub "/${Env}/${ServiceName}/datadog-api-key"
      Description: "The Datadog API key"
      SecretString: !Ref DDApiKey

  LoyaltyServiceEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub "${ServiceName}-Bus-${Env}"

  LoyaltyBusNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${Env}/${ServiceName}/event-bus-name
      Type: String
      Value: !Ref LoyaltyServiceEventBus

  LoyaltyBusArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${Env}/${ServiceName}/event-bus-arn
      Type: String
      Value: !GetAtt LoyaltyServiceEventBus.Arn

  LoyaltysSecretAccessKeyParameter:
    Type: AWS::SSM::Parameter
    Condition: IsNotIntegratedEnvironment
    Properties:
      Name: !Sub /${Env}/${ServiceName}/secret-access-key
      Type: String
      Value: "This is a sample secret key that should not be used in production`"
      
################################################
################     API     ###################
################################################

  GetLoyaltyPointsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./out/getLoyaltyAccountFunction/getLoyaltyAccountFunction.zip
      Handler: index.handler
      FunctionName: !Sub GetLoyaltyPointsFunction-${Env}
      Environment:
        Variables:
          EVENT_BUS_NAME: !If
            - IsIntegratedEnvironment
            - !Sub "{{resolve:ssm:/${Env}/shared/event-bus-name:1}}"
            - !Ref LoyaltyServiceEventBus
          JWT_SECRET_PARAM_NAME: !If
            - IsIntegratedEnvironment
            - !Sub /${Env}/shared/secret-access-key
            - !Sub /${Env}/${ServiceName}/secret-access-key
      Events:
        GetProduct:
          Type: Api
          Properties: 
            Path: /loyalty
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName:
              !Ref LoyaltyAccountTable
        - EventBridgePutEventsPolicy:
            EventBusName: !If
              - IsIntegratedEnvironment
              - !Sub "{{resolve:ssm:/${Env}/shared/event-bus-name:1}}"
              - !Ref LoyaltyServiceEventBus
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref DDApiKeySecret
        # The Datadog extension sends log data to Datadog using the telemetry API, disabling CloudWatch prevents 'double paying' for logs
        - Version: "2012-10-17"
          Statement:
            - Effect: Deny
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: arn:aws:logs:*:*:*
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - "ssm:DescribeParameters"
                - "ssm:GetParameter"
                - "ssm:GetParameterHistory"
                - "ssm:GetParameters"
              Resource: !If
                - IsIntegratedEnvironment
                - !Sub "arn:aws:ssm:${AWS::Region}:*:parameter/${Env}/shared/secret-access-key"
                - !Sub "arn:aws:ssm:${AWS::Region}:*:parameter/${Env}/${ServiceName}/secret-access-key"

  SpendLoyaltyPointsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./out/spendLoyaltyPointsFunction/spendLoyaltyPointsFunction.zip
      Handler: index.handler
      FunctionName: !Sub SpendLoyaltyPointsFunction-${Env}
      Environment:
        Variables:
          JWT_SECRET_PARAM_NAME: !If
            - IsIntegratedEnvironment
            - !Sub /${Env}/shared/secret-access-key
            - !Sub /${Env}/${ServiceName}/secret-access-key
          DD_TRACE_DYNAMODB_TABLE_PRIMARY_KEYS: !Sub '{"${LoyaltyAccountTable}": ["PK"]}'
      Events:
        SpendPoints:
          Type: Api
          Properties: 
            Path: /loyalty
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName:
              !Ref LoyaltyAccountTable
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref DDApiKeySecret
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - "ssm:DescribeParameters"
                - "ssm:GetParameter"
                - "ssm:GetParameterHistory"
                - "ssm:GetParameters"
              Resource: !If
                - IsIntegratedEnvironment
                - !Sub "arn:aws:ssm:${AWS::Region}:*:parameter/${Env}/shared/secret-access-key"
                - !Sub "arn:aws:ssm:${AWS::Region}:*:parameter/${Env}/${ServiceName}/secret-access-key"

  HandleLoyaltyPointsUpdatedFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./out/handleLoyaltyPointsUpdated/handleLoyaltyPointsUpdated.zip
      Handler: index.handler
      FunctionName: !Sub HandleLoyaltyPointsUpdated-${Env}
      Environment:
        Variables:
          DD_TRACE_DYNAMODB_TABLE_PRIMARY_KEYS: !Sub '{"${LoyaltyAccountTable}": ["PK"]}'
          EVENT_BUS_NAME: !If
              - IsIntegratedEnvironment
              - !Sub "{{resolve:ssm:/${Env}/shared/event-bus-name:1}}"
              - !Ref LoyaltyServiceEventBus
      Events:
        DDBEvent:
          Type: DynamoDB
          Properties:
            Stream: 
              !GetAtt LoyaltyAccountTable.StreamArn   # This must be the name of a DynamoDB table declared in the same template file
            StartingPosition: LATEST
            BatchSize: 5
            Enabled: true
      Policies:
        - EventBridgePutEventsPolicy:
            EventBusName: !If
              - IsIntegratedEnvironment
              - !Sub "{{resolve:ssm:/${Env}/shared/event-bus-name:1}}"
              - !Ref LoyaltyServiceEventBus
        - DynamoDBCrudPolicy:
            TableName:
              !Ref LoyaltyAccountTable
        - DynamoDBStreamReadPolicy:
            TableName:
              !Ref LoyaltyAccountTable
            StreamName: "*"
        - EventBridgePutEventsPolicy:
            EventBusName: !If
              - IsIntegratedEnvironment
              - !Sub "{{resolve:ssm:/${Env}/shared/event-bus-name:1}}"
              - !Ref LoyaltyServiceEventBus

################################################
############# Background Workers ###############
################################################

  HandleUserCreatedEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./out/handleUserCreatedFunction/handleUserCreatedFunction.zip
      Handler: index.handler
      FunctionName: !Sub HandleUserCreated-${Env}
      Environment:
        Variables:
          DD_TRACE_DYNAMODB_TABLE_PRIMARY_KEYS: !Sub '{"${LoyaltyAccountTable}": ["PK"]}'
          DD_TRACE_PROPAGATION_BEHAVIOR_EXTRACT: "none"
          DD_TRACE_PROPAGATION_STYLE_EXTRACT: "datadog,tracecontext"
      Events:
        UserCreatedQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt UserCreatedQueue.Arn
      Policies:
        - DynamoDBCrudPolicy:
            TableName:
              !Ref LoyaltyAccountTable
        - EventBridgePutEventsPolicy:
            EventBusName: !If
              - IsIntegratedEnvironment
              - !Sub "{{resolve:ssm:/${Env}/shared/event-bus-name:1}}"
              - !Ref LoyaltyServiceEventBus

  UserCreatedDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ServiceName}-UserCreatedDLQ-${Env}"

  UserCreatedQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ServiceName}-UserCreated-${Env}"
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt:
            - "UserCreatedDLQ"
            - "Arn"
        maxReceiveCount: 3

  UserCreatedEventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref LoyaltyServiceEventBus
      Name: loyalty-user-created
      State: ENABLED
      EventPattern:
        source:
          - !Sub "${Env}.users"
        detail-type:
          - "users.userCreated.v1"
      Targets:
        - Id: UserCreatedQueue
          Arn: !GetAtt UserCreatedQueue.Arn

  EBToUserCreatedQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref UserCreatedQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: allow-eb-send-message
            Effect: Allow
            Principal:
              Service: "events.amazonaws.com"
            Resource: !GetAtt UserCreatedQueue.Arn
            Action: SQS:SendMessage

  HandleOrderCompletedEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./out/handleOrderCompletedFunction/handleOrderCompletedFunction.zip
      Handler: index.handler
      FunctionName: !Sub HandleOrderCompleted-${Env}
      Environment:
        Variables:
          DD_TRACE_DYNAMODB_TABLE_PRIMARY_KEYS: !Sub '{"${LoyaltyAccountTable}": ["PK"]}'
          DD_TRACE_PROPAGATION_BEHAVIOR_EXTRACT: "none"
          DD_TRACE_PROPAGATION_STYLE_EXTRACT: "datadog,tracecontext"
      Events:
        OrderCompletedQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt OrderCompletedQueue.Arn
      Policies:
        - DynamoDBCrudPolicy:
            TableName:
              !Ref LoyaltyAccountTable

  OrderCompletedDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ServiceName}-OrderCompletedDLQ-${Env}"

  OrderCompletedQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ServiceName}-OrderCompleted-${Env}"
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt:
            - "OrderCompletedDLQ"
            - "Arn"
        maxReceiveCount: 3

  OrderCompletedEventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref LoyaltyServiceEventBus
      Name: loyalty-order-completed
      State: ENABLED
      EventPattern:
        source:
          - !Sub "${Env}.orders"
        detail-type:
          - "orders.orderCompleted.v1"
      Targets:
        - Id: OrderCompletedQueue
          Arn: !GetAtt OrderCompletedQueue.Arn

  EBToOrderCompletedQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref OrderCompletedQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: allow-eb-send-message
            Effect: Allow
            Principal:
              Service: "events.amazonaws.com"
            Resource: !GetAtt OrderCompletedQueue.Arn
            Action: SQS:SendMessage

################################################
######## Public Event Subscriptions ############
################################################
  SharedEventBusToLoyaltyServiceEventBusRole:
    Type: AWS::IAM::Role
    Condition: IsIntegratedEnvironment
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - events.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: allow-eb-publish
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - "events:PutEvents"
                Resource: [!GetAtt LoyaltyServiceEventBus.Arn]

  SharedEventBusUserCreatedEventRule:
    Type: AWS::Events::Rule
    Condition: IsIntegratedEnvironment
    Properties:
      EventBusName: !Sub "{{resolve:ssm:/${Env}/shared/event-bus-name:1}}"
      Name: shared-loyalty-user-created
      State: ENABLED
      EventPattern:
        source:
          - !Sub "${Env}.users"
        detail-type:
          - "users.userCreated.v1"
      Targets:
        - Id: LoyaltyServiceEventBus
          Arn: !GetAtt LoyaltyServiceEventBus.Arn
          RoleArn: !GetAtt SharedEventBusToLoyaltyServiceEventBusRole.Arn
          
  SharedEventBusOrderCompletedEventRule:
    Type: AWS::Events::Rule
    Condition: IsIntegratedEnvironment
    Properties:
      EventBusName: !Sub "{{resolve:ssm:/${Env}/shared/event-bus-name:1}}"
      Name: shared-loyalty-order-completed
      State: ENABLED
      EventPattern:
        source:
          - !Sub "${Env}.orders"
        detail-type:
          - "orders.orderCompleted.v1"
      Targets:
        - Id: LoyaltyServiceEventBus
          Arn: !GetAtt LoyaltyServiceEventBus.Arn
          RoleArn: !GetAtt SharedEventBusToLoyaltyServiceEventBusRole.Arn

  LoyaltyAccountTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${ServiceName}-Accounts-${Env}
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
      StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES

  ApiEndpoint:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${Env}/${ServiceName}/api-endpoint
      Type: String
      Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"

  LoyaltyTableNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${Env}/${ServiceName}/table-name
      Type: String
      Value: !Ref LoyaltyAccountTable

################################################
######### Durable Tier Upgrade Workflow ########
################################################

  TierUpgradeTriggerDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ServiceName}-TierUpgradeTriggerDLQ-${Env}"

  TierUpgradeTriggerQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ServiceName}-TierUpgradeTrigger-${Env}"
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt:
            - "TierUpgradeTriggerDLQ"
            - "Arn"
        maxReceiveCount: 3

  EBToTierUpgradeTriggerQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref TierUpgradeTriggerQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: allow-eb-send-message
            Effect: Allow
            Principal:
              Service: "events.amazonaws.com"
            Resource: !GetAtt TierUpgradeTriggerQueue.Arn
            Action: SQS:SendMessage

  TierUpgradeTriggerEventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref LoyaltyServiceEventBus
      Name: loyalty-tier-upgrade-trigger
      State: ENABLED
      EventPattern:
        source:
          - !Sub "${Env}.loyalty"
        detail-type:
          - "loyalty.pointsAdded.v2"
      Targets:
        - Id: TierUpgradeTriggerQueue
          Arn: !GetAtt TierUpgradeTriggerQueue.Arn

  SharedTierUpgradeTriggerEventRule:
    Type: AWS::Events::Rule
    Condition: IsIntegratedEnvironment
    Properties:
      EventBusName: !Sub "{{resolve:ssm:/${Env}/shared/event-bus-name:1}}"
      Name: shared-loyalty-tier-upgrade-trigger
      State: ENABLED
      EventPattern:
        source:
          - !Sub "${Env}.loyalty"
        detail-type:
          - "loyalty.pointsAdded.v2"
      Targets:
        - Id: LoyaltyServiceEventBus
          Arn: !GetAtt LoyaltyServiceEventBus.Arn
          RoleArn: !GetAtt SharedEventBusToLoyaltyServiceEventBusRole.Arn

  TierUpgradeTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./out/tierUpgradeTrigger/tierUpgradeTrigger.zip
      Handler: index.handler
      FunctionName: !Sub TierUpgradeTrigger-${Env}
      Environment:
        Variables:
          ORCHESTRATOR_FUNCTION_NAME: !Sub "${TierUpgradeOrchestratorFunction.Arn}:$LATEST"
      Events:
        TierUpgradeTriggerQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt TierUpgradeTriggerQueue.Arn
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource:
                - !GetAtt TierUpgradeOrchestratorFunction.Arn
                - !Sub "${TierUpgradeOrchestratorFunction.Arn}:*"
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref DDApiKeySecret
        - Version: "2012-10-17"
          Statement:
            - Effect: Deny
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: arn:aws:logs:*:*:*

  FetchOrderHistoryActivityFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./out/fetchOrderHistoryActivity/fetchOrderHistoryActivity.zip
      Handler: index.handler
      FunctionName: !Sub FetchOrderHistoryActivity-${Env}
      Environment:
        Variables:
          JWT_SECRET_PARAM_NAME: !If
            - IsIntegratedEnvironment
            - !Sub /${Env}/shared/secret-access-key
            - !Sub /${Env}/${ServiceName}/secret-access-key
          ORDER_SERVICE_ENDPOINT_PARAM: !Sub /${Env}/OrderService/api-endpoint
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - "ssm:DescribeParameters"
                - "ssm:GetParameter"
                - "ssm:GetParameterHistory"
                - "ssm:GetParameters"
              Resource:
                - !If
                  - IsIntegratedEnvironment
                  - !Sub "arn:aws:ssm:${AWS::Region}:*:parameter/${Env}/shared/secret-access-key"
                  - !Sub "arn:aws:ssm:${AWS::Region}:*:parameter/${Env}/${ServiceName}/secret-access-key"
                - !Sub "arn:aws:ssm:${AWS::Region}:*:parameter/${Env}/OrderService/api-endpoint"
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref DDApiKeySecret
        - Version: "2012-10-17"
          Statement:
            - Effect: Deny
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: arn:aws:logs:*:*:*

  TierUpgradeOrchestratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./out/tierUpgradeOrchestrator/tierUpgradeOrchestrator.zip
      Handler: index.handler
      FunctionName: !Sub TierUpgradeOrchestrator-${Env}
      Environment:
        Variables:
          TABLE_NAME: !Ref LoyaltyAccountTable
          EVENT_BUS_NAME: !If
            - IsIntegratedEnvironment
            - !Sub "{{resolve:ssm:/${Env}/shared/event-bus-name:1}}"
            - !Ref LoyaltyServiceEventBus
          FETCH_ORDER_HISTORY_ACTIVITY_ARN: !Sub "${FetchOrderHistoryActivityFunction.Arn}:$LATEST"
          PRODUCT_SERVICE_ENDPOINT_PARAM: !Sub /${Env}/ProductService/api-endpoint
          PRODUCT_SEARCH_ENDPOINT_PARAM: !Sub /${Env}/ProductSearchService/api-endpoint
          JWT_SECRET_PARAM_NAME: !If
            - IsIntegratedEnvironment
            - !Sub /${Env}/shared/secret-access-key
            - !Sub /${Env}/${ServiceName}/secret-access-key
          ORDER_SERVICE_ENDPOINT_PARAM: !Sub /${Env}/OrderService/api-endpoint
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LoyaltyAccountTable
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - lambda:CheckpointDurableExecution
                - lambda:GetDurableExecutionState
              Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:TierUpgradeOrchestrator-${Env}:*"
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource:
                - !GetAtt FetchOrderHistoryActivityFunction.Arn
                - !Sub "${FetchOrderHistoryActivityFunction.Arn}:*"
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - "ssm:DescribeParameters"
                - "ssm:GetParameter"
                - "ssm:GetParameterHistory"
                - "ssm:GetParameters"
              Resource:
                - !If
                  - IsIntegratedEnvironment
                  - !Sub "arn:aws:ssm:${AWS::Region}:*:parameter/${Env}/shared/secret-access-key"
                  - !Sub "arn:aws:ssm:${AWS::Region}:*:parameter/${Env}/${ServiceName}/secret-access-key"
                - !Sub "arn:aws:ssm:${AWS::Region}:*:parameter/${Env}/OrderService/api-endpoint"
                - !Sub "arn:aws:ssm:${AWS::Region}:*:parameter/${Env}/ProductService/api-endpoint"
                - !Sub "arn:aws:ssm:${AWS::Region}:*:parameter/${Env}/ProductSearchService/api-endpoint"
        - EventBridgePutEventsPolicy:
            EventBusName: !If
              - IsIntegratedEnvironment
              - !Sub "{{resolve:ssm:/${Env}/shared/event-bus-name:1}}"
              - !Ref LoyaltyServiceEventBus
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref DDApiKeySecret
        - Version: "2012-10-17"
          Statement:
            - Effect: Deny
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: arn:aws:logs:*:*:*

  NotificationAcknowledgerDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ServiceName}-NotificationAcknowledgerDLQ-${Env}"

  NotificationAcknowledgerQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ServiceName}-NotificationAcknowledger-${Env}"
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt:
            - "NotificationAcknowledgerDLQ"
            - "Arn"
        maxReceiveCount: 3

  EBToNotificationAcknowledgerQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref NotificationAcknowledgerQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: allow-eb-send-message
            Effect: Allow
            Principal:
              Service: "events.amazonaws.com"
            Resource: !GetAtt NotificationAcknowledgerQueue.Arn
            Action: SQS:SendMessage

  NotificationAcknowledgerEventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref LoyaltyServiceEventBus
      Name: loyalty-notification-acknowledger
      State: ENABLED
      EventPattern:
        source:
          - !Sub "${Env}.loyalty"
        detail-type:
          - "loyalty.tierUpgraded.v1"
      Targets:
        - Id: NotificationAcknowledgerQueue
          Arn: !GetAtt NotificationAcknowledgerQueue.Arn

  SharedNotificationAcknowledgerEventRule:
    Type: AWS::Events::Rule
    Condition: IsIntegratedEnvironment
    Properties:
      EventBusName: !Sub "{{resolve:ssm:/${Env}/shared/event-bus-name:1}}"
      Name: shared-loyalty-notification-acknowledger
      State: ENABLED
      EventPattern:
        source:
          - !Sub "${Env}.loyalty"
        detail-type:
          - "loyalty.tierUpgraded.v1"
      Targets:
        - Id: LoyaltyServiceEventBus
          Arn: !GetAtt LoyaltyServiceEventBus.Arn
          RoleArn: !GetAtt SharedEventBusToLoyaltyServiceEventBusRole.Arn

  NotificationAcknowledgerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./out/notificationAcknowledger/notificationAcknowledger.zip
      Handler: index.handler
      FunctionName: !Sub NotificationAcknowledger-${Env}
      Events:
        NotificationAcknowledgerQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt NotificationAcknowledgerQueue.Arn
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - lambda:SendDurableExecutionCallbackSuccess
                - lambda:SendDurableExecutionCallbackFailure
              Resource:
                - !GetAtt TierUpgradeOrchestratorFunction.Arn
                - !Sub "${TierUpgradeOrchestratorFunction.Arn}:*"
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref DDApiKeySecret
        - Version: "2012-10-17"
          Statement:
            - Effect: Deny
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: arn:aws:logs:*:*:*