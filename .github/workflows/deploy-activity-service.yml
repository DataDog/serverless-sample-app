name: Deploy Activity Service

on:
  push:
    paths:
      - src/activity-service/**
      - .github/workflows/deploy-activity-service.yml
    branches:
      - "main"
  pull_request:
    paths:
      - src/activity-service/**
    branches:
      - "main"
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

