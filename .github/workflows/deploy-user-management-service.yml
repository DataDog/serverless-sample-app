name: Deploy User Management Service

on:
  push:
    paths:
      - src/user-management-service/**
    branches:
      - "main"
  pull_request:
    paths:
      - src/user-management-service/**
    branches:
      - "main"
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          cache-workspaces: src/user-management-service -> target
      - name: Install Cargo Lambda
        run: |
          pip install cargo-lambda
      - name: Run tests
        shell: bash
        run: |
          cd src/user-management-service
          cargo test --workspace --exclude integration-tests
      - name: Cargo clippy
        shell: bash
        run: |
          cd src/user-management-service
          cargo clippy --workspace -- -D warnings

  deploy-tf:
    runs-on: ubuntu-latest
    needs: unit-test
    concurrency:
      group: tf-user-management
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@633666f66e0061ca3b725c73b2ec20cd13a8fdd1 # v2.0.3
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          cache-workspaces: src/user-management-service -> target
      - name: Install Cargo Lambda
        run: |
          pip install cargo-lambda
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ vars.TF_AWS_REGION }}
      - name: Set Commit Hash Environment Variables
        shell: bash
        run: |
          echo "sha_short=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_ENV"
      - name: Build
        shell: bash
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          ENV: "dev"
          DD_API_KEY: ${{secrets.DD_API_KEY}}
          DD_SITE: ${{ vars.DD_SITE }}
          AWS_REGION: ${{ vars.CDK_PROD_AWS_REGION }}
        run: |
          cd src/user-management-service
          make build
      - name: Deploy to ephemeral environment
        shell: bash
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          ENV: "tf-${{ env.sha_short }}"
          DD_API_KEY: ${{secrets.DD_API_KEY}}
          DD_SITE: ${{ vars.DD_SITE }}
          AWS_REGION: ${{ vars.TF_AWS_REGION }}
          TF_STATE_BUCKET_NAME: ${{secrets.TF_STATE_BUCKET_NAME}}
        run: |
          cd src/user-management-service
          make tf-apply
      - name: Integration test ephemeral environment
        shell: bash
        env:
          ENV: "tf-${{ env.sha_short }}"
          AWS_REGION: ${{ vars.TF_AWS_REGION }}
        run: |
          cd src/user-management-service
          make integration-test
      - name: Destroy ephemeral environment
        if: always()
        shell: bash
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          ENV: "tf-${{ env.sha_short }}"
          DD_API_KEY: ${{secrets.DD_API_KEY}}
          DD_SITE: ${{ vars.DD_SITE }}
          AWS_REGION: ${{ vars.TF_AWS_REGION }}
          TF_STATE_BUCKET_NAME: ${{secrets.TF_STATE_BUCKET_NAME}}
        run: |
          cd src/user-management-service
          make build
          make tf-destroy
      - name: Deploy to dev
        if: github.event_name == 'push'
        shell: bash
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          ENV: "dev"
          DD_API_KEY: ${{secrets.DD_API_KEY}}
          DD_SITE: ${{ vars.DD_SITE }}
          AWS_REGION: ${{ vars.TF_AWS_REGION }}
          TF_STATE_BUCKET_NAME: ${{secrets.TF_STATE_BUCKET_NAME}}
        run: |
          cd src/user-management-service
          make tf-apply
      - name: Integration test dev
        if: github.event_name == 'push'
        shell: bash
        env:
          ENV: "dev"
          AWS_REGION: ${{ vars.TF_AWS_REGION }}
        run: |
          cd src/user-management-service
          make integration-test
      - name: Destroy dev
        if: always()
        shell: bash
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          ENV: "dev"
          DD_API_KEY: ${{secrets.DD_API_KEY}}
          DD_SITE: ${{ vars.DD_SITE }}
          AWS_REGION: ${{ vars.TF_AWS_REGION }}
          TF_STATE_BUCKET_NAME: ${{secrets.TF_STATE_BUCKET_NAME}}
        run: |
          cd src/user-management-service
          make build
          make tf-destroy

  deploy-cdk:
    runs-on: ubuntu-latest
    needs: unit-test
    concurrency:
      group: cdk-user-management
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: src/user-management-service/package-lock.json
      - name: Install CDK
        run: |
          npm install -g aws-cdk
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          cache-workspaces: src/user-management-service -> target
      - name: Install Cargo Lambda
        run: |
          pip install cargo-lambda
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ vars.CDK_AWS_REGION }}
      - name: Set Commit Hash Environment Variables
        shell: bash
        run: |
          echo "sha_short=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_ENV"
      - name: Deploy to ephemeral environment
        shell: bash
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          ENV: "cdk-${{ env.sha_short }}"
          DD_API_KEY: ${{secrets.DD_API_KEY}}
          DD_SITE: ${{ vars.DD_SITE }}
        run: |
          cd src/user-management-service
          npm i
          make cdk-deploy
      - name: Integration test ephemeral environment
        shell: bash
        env:
          ENV: "cdk-${{ env.sha_short }}"
          AWS_REGION: ${{ vars.CDK_AWS_REGION }}
        run: |
          cd src/user-management-service
          make integration-test
      - name: Destroy ephemeral environment
        if: always()
        shell: bash
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          ENV: "cdk-${{ env.sha_short }}"
          DD_API_KEY: ${{secrets.DD_API_KEY}}
          DD_SITE: ${{ vars.DD_SITE }}
        run: |
          cd src/user-management-service
          npm i
          make cdk-destroy
      - name: Deploy to dev
        if: github.event_name == 'push'
        shell: bash
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          ENV: "dev"
          DD_API_KEY: ${{secrets.DD_API_KEY}}
          DD_SITE: ${{ vars.DD_SITE }}
        run: |
          cd src/user-management-service
          npm i
          make cdk-deploy
      - name: Integration test dev
        if: github.event_name == 'push'
        shell: bash
        env:
          ENV: "dev"
          AWS_REGION: ${{ vars.CDK_AWS_REGION }}
        run: |
          cd src/user-management-service
          make integration-test
      - name: Destroy dev
        if: always()
        shell: bash
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          ENV: "dev"
          DD_API_KEY: ${{secrets.DD_API_KEY}}
          DD_SITE: ${{ vars.DD_SITE }}
        run: |
          cd src/user-management-service
          npm i
          make cdk-destroy

  deploy-cdk-prod:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: deploy-cdk
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: src/user-management-service/package-lock.json
      - name: Install CDK
        run: |
          npm install -g aws-cdk
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          cache-workspaces: src/user-management-service -> target
      - name: Install Cargo Lambda
        run: |
          pip install cargo-lambda
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df
        with:
          role-to-assume: ${{ secrets.PRODUCTION_AWS_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ vars.CDK_PROD_AWS_REGION }}
      - name: Set Commit Hash Environment Variables
        shell: bash
        run: |
          echo "sha_short=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_ENV"
      - name: Deploy to ephemeral environment
        shell: bash
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          ENV: "prod"
          DD_API_KEY: ${{secrets.DD_API_KEY}}
          DD_SITE: ${{ vars.DD_SITE }}
        run: |
          cd src/user-management-service
          npm i
          make cdk-deploy
      - name: Integration test ephemeral environment
        shell: bash
        env:
          ENV: "prod"
          AWS_REGION: ${{ vars.CDK_PROD_AWS_REGION }}
        run: |
          cd src/user-management-service
          make integration-test

  deploy-sam:
    runs-on: ubuntu-latest
    needs: unit-test
    concurrency:
      group: sam-user-management
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Node
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3.9.1
        with:
          node-version: "22"
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          cache-workspaces: src/user-management-service -> target
      - name: Install Cargo Lambda
        run: |
          pip install cargo-lambda
      - uses: aws-actions/setup-sam@0578b2f57e540e67233c3ce0c5477ee36938ff3d # v1.0.0
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ vars.SAM_AWS_REGION }}
      - name: Set Commit Hash Environment Variables
        shell: bash
        run: |
          echo "sha_short=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_ENV"
      - name: Deploy to ephemeral environment
        shell: bash
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          ENV: "sam-${{ env.sha_short }}"
          DD_API_KEY: ${{secrets.DD_API_KEY}}
          DD_SITE: ${{ vars.DD_SITE }}
          AWS_REGION: ${{ vars.SAM_AWS_REGION }}
        run: |
          cd src/user-management-service
          make sam
      - name: Integration test ephemeral environment
        shell: bash
        env:
          ENV: "sam-${{ env.sha_short }}"
          AWS_REGION: ${{ vars.SAM_AWS_REGION }}
        run: |
          cd src/user-management-service
          make integration-test
      - name: Destroy ephemeral environment
        if: always()
        shell: bash
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          ENV: "sam-${{ env.sha_short }}"
          DD_API_KEY: ${{secrets.DD_API_KEY}}
          DD_SITE: ${{ vars.DD_SITE }}
          AWS_REGION: ${{ vars.SAM_AWS_REGION }}
        run: |
          cd src/user-management-service
          make sam-destroy
      - name: Deploy to dev
        if: github.event_name == 'push'
        shell: bash
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          ENV: "dev"
          DD_API_KEY: ${{secrets.DD_API_KEY}}
          DD_SITE: ${{ vars.DD_SITE }}
          AWS_REGION: ${{ vars.SAM_AWS_REGION }}
        run: |
          cd src/user-management-service
          make sam
      - name: Integration test dev
        if: github.event_name == 'push'
        shell: bash
        env:
          ENV: "dev"
          AWS_REGION: ${{ vars.SAM_AWS_REGION }}
        run: |
          cd src/user-management-service
          make integration-test
      - name: Destroy dev
        if: always()
        shell: bash
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          ENV: "dev"
          DD_API_KEY: ${{secrets.DD_API_KEY}}
          DD_SITE: ${{ vars.DD_SITE }}
          AWS_REGION: ${{ vars.SAM_AWS_REGION }}
        run: |
          cd src/user-management-service
          make sam-destroy

