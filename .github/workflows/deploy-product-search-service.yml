name: Deploy Product Search Service

on:
  push:
    paths:
      - src/product-search-service/**
      - .github/workflows/deploy-product-search-service.yml
    branches:
      - "main"
  pull_request:
    paths:
      - src/product-search-service/**
    branches:
      - "main"
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install poetry
        run: pipx install poetry
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
          cache: "poetry"
      - name: Install dependencies
        run: |
          cd src/product-search-service
          make install
      - name: Run unit tests
        run: |
          cd src/product-search-service
          make unit-test
      - name: Lint and type check
        run: |
          cd src/product-search-service
          make lint

  # deploy-tf: intentionally disabled - Terraform IaC path not active for this service

  deploy-cdk:
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - name: Check out repository code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install poetry
        run: pipx install poetry
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
          cache: "poetry"
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.0.3
        with:
          node-version: "20"
      - name: Install CDK
        run: npm install -g aws-cdk
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df # v4.2.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ vars.CDK_AWS_REGION }}
      - name: Set Commit Hash Environment Variables
        shell: bash
        run: |
          echo "sha_short=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: |
          cd src/product-search-service
          make install
      - name: Deploy ephemeral environment
        shell: bash
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          VERSION: ${{ env.sha_short }}
          ENV: ${{ env.sha_short }}
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_SITE: ${{ vars.DD_SITE }}
        run: |
          cd src/product-search-service
          make cdk-deploy
      - name: Integration test ephemeral environment
        shell: bash
        env:
          ENV: ${{ env.sha_short }}
          AWS_REGION: ${{ vars.CDK_AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ vars.CDK_AWS_REGION }}
        run: |
          cd src/product-search-service
          make integration-test
      - name: Destroy ephemeral environment
        shell: bash
        if: always()
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          VERSION: ${{ env.sha_short }}
          ENV: ${{ env.sha_short }}
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_SITE: ${{ vars.DD_SITE }}
        run: |
          cd src/product-search-service
          make cdk-destroy
      - name: Deploy to dev
        if: github.event_name == 'push'
        shell: bash
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          VERSION: ${{ env.sha_short }}
          ENV: "dev"
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_SITE: ${{ vars.DD_SITE }}
        run: |
          cd src/product-search-service
          make cdk-deploy
      - name: Integration test dev
        if: github.event_name == 'push'
        shell: bash
        env:
          ENV: "dev"
          AWS_REGION: ${{ vars.CDK_AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ vars.CDK_AWS_REGION }}
        run: |
          cd src/product-search-service
          make integration-test
      - name: Destroy dev
        shell: bash
        if: always()
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          VERSION: ${{ env.sha_short }}
          ENV: "dev"
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_SITE: ${{ vars.DD_SITE }}
        run: |
          cd src/product-search-service
          make cdk-destroy

  deploy-cdk-prod:
    runs-on: ubuntu-latest
    needs: [deploy-cdk]
    if: github.event_name == 'push'
    steps:
      - name: Check out repository code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install poetry
        run: pipx install poetry
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
          cache: "poetry"
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.0.3
        with:
          node-version: "20"
      - name: Install CDK
        run: npm install -g aws-cdk
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df # v4.2.1
        with:
          role-to-assume: ${{ secrets.PRODUCTION_AWS_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ vars.CDK_PROD_AWS_REGION }}
      - name: Set Commit Hash Environment Variables
        shell: bash
        run: |
          echo "sha_short=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: |
          cd src/product-search-service
          make install
      - name: Deploy to prod
        shell: bash
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          VERSION: ${{ env.sha_short }}
          ENV: "prod"
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_SITE: ${{ vars.DD_SITE }}
        run: |
          cd src/product-search-service
          make cdk-deploy
      - name: Integration test prod
        shell: bash
        env:
          ENV: "prod"
          AWS_REGION: ${{ vars.CDK_PROD_AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ vars.CDK_PROD_AWS_REGION }}
        run: |
          cd src/product-search-service
          make integration-test

  deploy-sam:
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - name: Check out repository code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install poetry
        run: pipx install poetry
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
          cache: "poetry"
      - uses: aws-actions/setup-sam@0578b2f57e540e67233c3ce0c5477ee36938ff3d # v1.0.0
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df # v4.2.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ vars.SAM_AWS_REGION }}
      - name: Set Commit Hash Environment Variables
        shell: bash
        run: |
          echo "sha_short=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_ENV"
      - name: Install dependencies
        shell: bash
        env:
          AWS_REGION: ${{ vars.SAM_AWS_REGION }}
        run: |
          cd src/product-search-service
          make install
      - name: Deploy ephemeral environment
        shell: bash
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          VERSION: ${{ env.sha_short }}
          ENV: ${{ env.sha_short }}
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_SITE: ${{ vars.DD_SITE }}
          AWS_REGION: ${{ vars.SAM_AWS_REGION }}
        run: |
          cd src/product-search-service
          make sam
      - name: Integration test ephemeral environment
        shell: bash
        env:
          ENV: ${{ env.sha_short }}
          AWS_REGION: ${{ vars.SAM_AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ vars.SAM_AWS_REGION }}
        run: |
          cd src/product-search-service
          make integration-test
      - name: Destroy ephemeral environment
        shell: bash
        if: always()
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          ENV: ${{ env.sha_short }}
          AWS_REGION: ${{ vars.SAM_AWS_REGION }}
        run: |
          cd src/product-search-service
          make sam-destroy
      - name: Deploy to dev
        if: github.event_name == 'push'
        shell: bash
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          VERSION: ${{ env.sha_short }}
          ENV: "dev"
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_SITE: ${{ vars.DD_SITE }}
          AWS_REGION: ${{ vars.SAM_AWS_REGION }}
        run: |
          cd src/product-search-service
          make sam
      - name: Integration test dev
        if: github.event_name == 'push'
        shell: bash
        env:
          ENV: "dev"
          AWS_REGION: ${{ vars.SAM_AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ vars.SAM_AWS_REGION }}
        run: |
          cd src/product-search-service
          make integration-test
      - name: Destroy dev
        shell: bash
        if: always()
        env:
          COMMIT_HASH: ${{ env.sha_short }}
          VERSION: ${{ env.sha_short }}
          ENV: "dev"
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_SITE: ${{ vars.DD_SITE }}
          AWS_REGION: ${{ vars.SAM_AWS_REGION }}
        run: |
          cd src/product-search-service
          make sam-destroy
