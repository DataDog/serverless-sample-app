config:
  target: "https://"
  http:
    timeout: 60
  processor: "generator.js"
  phases:
    # Arrival count is a fixed number of requests to be sent over the duration.
    # Phases are gentler than the main simulator to account for Bedrock latency.
    - duration: 10
      arrivalCount: 5
    - duration: 30
      arrivalCount: 10
    - duration: 60
      arrivalCount: 15
    - duration: 120
      arrivalCount: 20
    - duration: 60
      arrivalCount: 10

scenarios:
  - name: "Product search"
    flow:
      - function: "generateSearchQuery"
      - post:
          url: "{{ $processEnvironment.PRODUCT_SEARCH_ENDPOINT }}/search"
          headers:
            Content-Type: "application/json"
          json:
            query: "{{ SearchQuery }}"
